<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷屆成果 | PERIC 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-placeholder"></div>
    <div class="container py-5">
        <h2 class="section-title">歷屆輝煌成果：PERIC 2025</h2>
        <div class="row g-4 mb-5">
            <div class="col-md-3"><div class="stats-box"><h2 class="display-4 fw-bold" style="color: var(--primary-blue);">330+</h2><p class="fw-bold mb-0">總參與人次</p></div></div>
            <div class="col-md-3"><div class="stats-box"><h2 class="display-4 fw-bold" style="color: var(--primary-blue);">7</h2><p class="fw-bold mb-0">參與國家/地區</p></div></div>
            <div class="col-md-3"><div class="stats-box"><h2 class="display-4 fw-bold" style="color: var(--primary-blue);">24</h2><p class="fw-bold mb-0">學術論文發表</p></div></div>
            <div class="col-md-3"><div class="stats-box"><h2 class="display-4 fw-bold" style="color: var(--primary-blue);">10</h2><p class="fw-bold mb-0">專題論壇與工作坊</p></div></div>
        </div>
        <div class="p-4 bg-light border-start border-primary border-4 mb-4">
            <h4 class="fw-bold text-dark">🌐 成功建立亞太救護網絡</h4>
            <p class="text-muted mb-0">PERIC 2025 成功邀集來自澳洲 🇦🇺、日本 🇯🇵、新加坡 🇸🇬、菲律賓 🇵🇭、馬來西亞 🇲🇾、泰國 🇹🇭 及香港 🇭🇰 等 7 個國家/地區之專家學者。</p>
        </div>
    </div>
    <div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>

<script>
    // 1. 自動載入共用 Navbar
    fetch('navbar-zh.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar-placeholder').innerHTML = data;
            
            // 2. 自動判斷目前網址，將對應的選單加上 active (亮燈)
            let currentPath = window.location.pathname.split('/').pop();
            if (currentPath === '') currentPath = 'index-zh.html'; 
            
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });

            // 3. 自動設定「語系切換按鈕」的正確網址 (把 -zh 拿掉就是英文版)
            let enPath = currentPath.replace('-zh', '');
            document.getElementById('lang-switch-en').setAttribute('href', enPath);
        });
</script>
</body>
</html>
