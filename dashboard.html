<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大會戰情室 | PERIC 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .stat-val { font-size: 2.2rem; font-weight: 800; line-height: 1.2; margin-top: 5px; }
        .stat-label { font-size: 0.95rem; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; }
        .bg-gradient-primary { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); color: white; }
        .bg-gradient-primary .stat-label { color: rgba(255,255,255,0.8); }
        .bg-gradient-success { background: linear-gradient(135deg, #198754 0%, #146c43 100%); color: white; }
        .bg-gradient-success .stat-label { color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0" style="color: #2c3e50;">📊 PERIC 2026 大會戰情室</h2>
            <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()">重新整理資料</button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card border-bottom border-4 border-primary">
                    <div class="stat-label">✅ 總報名人數</div>
                    <div class="stat-val text-primary" id="totalValid">-</div>
                    <small class="text-muted mt-2">含線上與現場繳費</small>
                </div>
            </div>
            <div class="col-md-5">
                <div class="stat-card bg-gradient-primary">
                    <div class="stat-label">💰 預估總收入 (含現場繳費)</div>
                    <div class="stat-val" id="totalRev">載入中...</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card bg-gradient-success">
                    <div class="stat-label">👑 VIP 貴賓票</div>
                    <div class="stat-val" id="vipCount">-</div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-md-3">
                <div class="stat-card border-bottom border-4 border-info">
                    <div class="stat-label">📅 10/02 出席人次</div>
                    <div class="stat-val text-info" id="day1Count">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card border-bottom border-4 border-info">
                    <div class="stat-label">📅 10/03 出席人次</div>
                    <div class="stat-val text-info" id="day2Count">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="background-color: #fff8e1;">
                    <div class="stat-label text-dark">🎤 口頭發表投稿</div>
                    <div class="stat-val text-dark" id="oralCount">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="background-color: #e8f5e9;">
                    <div class="stat-label text-dark">🖼️ 海報展示投稿</div>
                    <div class="stat-val text-dark" id="posterCount">-</div>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow-sm border">
            <h5 class="fw-bold mb-3 border-bottom pb-2">最新報名動態 (前 15 筆)</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>訂單編號</th><th>姓名</th><th>專業身分</th><th>票種</th><th>應繳金額</th><th>當前狀態</th>
                        </tr>
                    </thead>
                    <tbody id="listBody">
                        <tr><td colspan="6" class="text-center text-muted py-4">資料連線載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ⭐️ 請填寫您部署後的 GAS 網址 (務必確認有更新到最新版本)
        const GAS_URL = "您的_GAS_網頁應用程式網址"; 
        
        fetch(`${GAS_URL}?action=dashboard`)
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const s = data.stats;
                    // 更新數字
                    document.getElementById('totalValid').innerText = s.totalValid;
                    document.getElementById('totalRev').innerText = "NT$ " + s.revenue.toLocaleString();
                    document.getElementById('vipCount').innerText = s.vip;
                    document.getElementById('day1Count').innerText = s.day1;
                    document.getElementById('day2Count').innerText = s.day2;
                    document.getElementById('oralCount').innerText = s.oral + " 篇";
                    document.getElementById('posterCount').innerText = s.poster + " 篇";
                    
                    // 更新表格 (倒序顯示最新的)
                    const tbody = document.getElementById('listBody');
                    tbody.innerHTML = "";
                    const recentData = data.data.reverse().slice(0, 15);
                    
                    if(recentData.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-3">目前尚無報名資料</td></tr>`;
                    } else {
                        recentData.forEach(row => {
                            let badgeClass = "bg-secondary";
                            if(row[5] === "已繳費") badgeClass = "bg-success";
                            if(row[5] === "現場繳費") badgeClass = "bg-warning text-dark";
                            
                            tbody.innerHTML += `
                                <tr>
                                    <td class="text-muted small">${row[0]}</td>
                                    <td class="fw-bold">${row[1]}</td>
                                    <td>${row[2]}</td>
                                    <td>${row[3] === '1day' ? '單日票' : (row[3] === '2dayGen' ? '二日一般' : '二日VIP')}</td>
                                    <td>NT$ ${row[4]}</td>
                                    <td><span class="badge ${badgeClass}">${row[5]}</span></td>
                                </tr>
                            `;
                        });
                    }
                } else {
                    alert("載入失敗：" + data.message);
                }
            }).catch(e => {
                document.getElementById('listBody').innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">網路連線錯誤，請確認 GAS 網址是否正確</td></tr>`;
            });
    </script>
</body>
</html>
