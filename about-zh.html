<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERIC 2026 | 醫療救護與緊急應變國際研討會</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <header class="hero-section text-center">
        <div class="container">
            <span class="badge bg-primary px-3 py-2 fs-6 mb-3">🇹🇼 2026年10月02日 - 10月03日 | 台灣 北投會館</span>
            <h1 class="mb-3" style="color: var(--primary-blue); font-size: 3.5rem; font-weight: 800;">醫療救護與緊急應變國際研討會</h1>
            <p class="lead fw-bold fs-3 text-dark mt-4">大會主題：<span style="color: var(--accent-green);">韌性與科技 (Resilience and Technology in EMS)</span></p>
            <div class="mt-5"><a href="program-zh.html#registration" class="btn btn-register btn-lg shadow">線上報名中心</a></div>
        </div>
    </header>
    <section class="py-5 bg-light">
        <div class="container py-4">
            <h2 class="section-title">2026 大會亮點</h2>
            <div class="row g-4 mt-2">
                <div class="col-md-4"><div class="card-custom p-4"><h4 class="fw-bold mb-3" style="color: var(--primary-blue);">🌐 五國 EMS 戰略同盟</h4><p class="text-muted mb-0">匯聚美國 🇺🇸、澳洲 🇦🇺、沙烏地阿拉伯 🇸🇦、新加坡 🇸🇬 與台灣 🇹🇼 頂尖學者。</p></div></div>
                <div class="col-md-4"><div class="card-custom p-4"><h4 class="fw-bold mb-3" style="color: var(--primary-blue);">🤖 智慧 EMS 科技落地</h4><p class="text-muted mb-0">聚焦智慧救護科技研發與實務落地，全面提升緊急醫療救護體系之韌性。</p></div></div>
                <div class="col-md-4"><div class="card-custom p-4"><h4 class="fw-bold mb-3" style="color: var(--primary-blue);">🚑 臨床治理與大師課</h4><p class="text-muted mb-0">邀請 Ambulance Victoria 醫務總監分享經驗，並舉辦 CRM 高階大師課程。</p></div></div>
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
<script>
    // 1. 自動載入共用 Navbar
    fetch('navbar-zh.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar-placeholder').innerHTML = data;
            
            // 2. 自動判斷目前網址，將對應的選單加上 active (亮燈)
            let currentPath = window.location.pathname.split('/').pop();
            if (currentPath === '') currentPath = 'index-zh.html'; 
            
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });

            // 3. 自動設定「語系切換按鈕」的正確網址 (把 -zh 拿掉就是英文版)
            let enPath = currentPath.replace('-zh', '');
            document.getElementById('lang-switch-en').setAttribute('href', enPath);
        });
</script>

</body>
</html>
