<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上報名系統 | PERIC 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css?v=1.7" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="navbar-placeholder"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 bg-white p-5 rounded shadow-sm">
                <h2 class="fw-bold mb-4 text-center" style="color: var(--primary-blue);">PERIC 2026 線上報名表</h2>
                
                <form id="regForm">
                    <!-- 會員驗證 -->
                    <div class="p-4 rounded mb-4" style="background-color: #f0f7ff; border: 1px solid #cce5ff;">
                        <label class="form-label fw-bold">身分驗證 (TSP 會員請先驗證以獲取優惠)</label>
                        <div class="input-group">
                            <input type="text" id="verifyID" class="form-control" placeholder="請輸入身分證字號">
                            <button type="button" class="btn btn-primary" onclick="checkMember()">驗證會員資格</button>
                        </div>
                        <div id="verifyMsg" class="mt-2 small"></div>
                        <input type="hidden" id="isMember" value="false">
                    </div>

                    <!-- 報名者基本資料 -->
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label fw-bold">姓名</label><input type="text" name="name" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">電子郵件</label><input type="email" name="email" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">聯絡電話</label><input type="tel" name="phone" class="form-control" placeholder="例: 0912345678" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">所屬單位</label><input type="text" name="org" class="form-control" required></div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">身分</label>
                            <select name="role" class="form-select" required>
                                <option value="">請選擇...</option>
                                <option value="EMTP">EMTP</option>
                                <option value="EMT2">EMT2</option>
                                <option value="EMT1">EMT1</option>
                                <option value="醫師">醫師</option>
                                <option value="護理師">護理師</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">飲食需求</label>
                            <select name="diet" class="form-select" required>
                                <option value="">請選擇...</option>
                                <option value="葷食">葷食</option>
                                <option value="蛋奶素">素食 (蛋奶素)</option>
                                <option value="全素">素食 (全素)</option>
                                <option value="不用餐">不用餐</option>
                            </select>
                        </div>
                    </div>

                    <!-- 收據開立 -->
                    <div class="mt-4">
                        <label class="form-label fw-bold">收據開立資訊 (選填)</label>
                        <div class="row g-3">
                            <div class="col-md-6"><input type="text" name="invoiceTitle" class="form-control" placeholder="收據抬頭"></div>
                            <div class="col-md-6"><input type="text" name="taxId" class="form-control" placeholder="統一編號"></div>
                        </div>
                    </div>

                    <!-- 票種選擇 -->
                    <div class="mt-4">
                        <label class="form-label fw-bold">選擇票種</label>
                        <select name="ticketType" id="ticketType" class="form-select" onchange="calculatePrice(); toggleSingleDay();" required>
                            <option value="">請選擇...</option>
                            <option value="1day">單日票 (任選一日)</option>
                            <option value="2dayGen">二日一般套票</option>
                            <option value="2dayVIP">二日 VIP 套票</option>
                        </select>
                    </div>

                    <div id="singleDaySection" class="mt-3 p-3 border rounded" style="display:none; background-color: #fff3cd; border-color: #ffeeba;">
                        <label class="form-label fw-bold text-dark">📌 請選擇您預計參加的日期 (單日票專屬)</label>
                        <select name="attendDay" id="attendDay" class="form-select">
                            <option value="">請選擇...</option>
                            <option value="10/02">10/02 (第一天)</option>
                            <option value="10/03">10/03 (第二天)</option>
                        </select>
                    </div>

                    <!-- 住宿選擇 -->
                    <div class="mt-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="needRoom" name="needRoom" value="是" onchange="toggleRoom()">
                            <label class="form-check-label fw-bold">我需要由大會代訂北投會館住宿</label>
                        </div>
                        <div id="roomSection" class="mt-3 p-3 border rounded bg-light" style="display:none;">
                            <label class="form-label">房型選擇</label>
                            <select name="roomType" class="form-select">
                                <option value="2person">標準 2 人房</option>
                                <option value="4person">標準 4 人房</option>
                            </select>
                            <p class="small text-danger mt-2">※ 住宿費用將由大會後續另行通知繳費，不包含在本次刷卡金額中。</p>
                        </div>
                    </div>

                    <div class="mt-5 p-4 rounded text-center" style="background-color: var(--primary-blue); color: white;">
                        <h4 class="mb-1">應付總金額 (不含住宿)</h4>
                        <div class="display-5 fw-bold">NT$ <span id="displayTotal">0</span></div>
                        <input type="hidden" id="finalAmount" name="amount" value="0">
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 mt-4 shadow" id="submitBtn">確認報名並前往線上繳費</button>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js?v=1.7"></script>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbypEWQfTKYUP9oBQmow7_Lnr0tG5WLAnSBxMznhgcpct8fw7hr371d4Zn4dEK6sLozNNg/exec"; // 將在下一步提供給您

        const prices = {
            member: { "1day": 1500, "2dayGen": 2500, "2dayVIP": 3500 },
            nonMember: { "1day": 2000, "2dayGen": 3500, "2dayVIP": 4500 }
        };

        function checkMember() {
            const id = document.getElementById('verifyID').value;
            const msg = document.getElementById('verifyMsg');
            if(!id) return alert("請輸入身分證字號");
            msg.innerHTML = "驗證中...";
            fetch(`${GAS_URL}?action=verify&id=${id}`)
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        msg.innerHTML = `<span class="text-success fw-bold">✅ 驗證成功！歡迎 ${data.name} 會員</span>`;
                        document.getElementById('isMember').value = "true";
                    } else {
                        msg.innerHTML = `<span class="text-danger">❌ 查無此會員編號，將以一般票價計算</span>`;
                        document.getElementById('isMember').value = "false";
                    }
                    calculatePrice();
                }).catch(e => {
                    msg.innerHTML = `<span class="text-danger">網路連線異常，請稍後再試</span>`;
                });
        }

        function calculatePrice() {
            const isMember = document.getElementById('isMember').value === "true";
            const ticket = document.getElementById('ticketType').value;
            if(!ticket) { document.getElementById('displayTotal').innerText = "0"; return; }
            let price = isMember ? prices.member[ticket] : prices.nonMember[ticket];
            if(new Date() <= new Date("2026-07-31T23:59:59")) { price = Math.round(price * 0.8); }
            document.getElementById('displayTotal').innerText = price.toLocaleString();
            document.getElementById('finalAmount').value = price;
        }

        function toggleSingleDay() {
            const ticket = document.getElementById('ticketType').value;
            const daySection = document.getElementById('singleDaySection');
            const dayInput = document.getElementById('attendDay');
            if (ticket === '1day') {
                daySection.style.display = 'block'; dayInput.required = true;
            } else {
                daySection.style.display = 'none'; dayInput.required = false; dayInput.value = "";
            }
        }

        function toggleRoom() {
            document.getElementById('roomSection').style.display = document.getElementById('needRoom').checked ? 'block' : 'none';
        }

        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            const amount = document.getElementById('finalAmount').value;
            if (amount <= 0) { alert("請選擇有效的票種"); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "資料處理中，準備跳轉至綠界金流...";
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            data.action = "register";
            data.isMember = document.getElementById('isMember').value;

fetch(GAS_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(data)
})
.then(response => response.json())
.then(result => {
    if (result.success) {
        alert("✅ 報名資料已成功送出！\n\n系統已將【專屬繳費連結】寄至您的電子信箱。\n請前往信箱收信並完成繳費手續。");
        window.location.reload(); // 報名成功後重整頁面
    } else {
        alert("報名失敗：" + (result.message || "未知錯誤"));
    }
})
.catch(error => {
    console.error("【錯誤訊息】:", error); 
    // 即使有 CORS 報錯，只要資料有進試算表，我們就可以當作成功
    alert("您的資料我們可能已經收到！請檢查信箱是否收到繳費信件。若無，請聯絡秘書處。");
});
       };
    </script>
</body>
</html>
